{% extends 'base.html' %}

{% block title %}Create Story{% endblock %}

{% block content %}
    <h2>Create a New Story</h2>
    {% if current_user.is_authenticated %}
        <form method="post">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" class="form-control" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" class="form-control" required></textarea>
            </div>

            <div class="form-group">
                <label for="genre">Genre:</label>
                <input type="text" id="genre" name="genre" class="form-control" required>
            </div>

            <input type="submit" value="Create Story" class="btn btn-primary">
        </form>
    {% else %}
        <p>You must be logged in to create stories. Please <a href="{{ url_for('login') }}">login</a> or <a href="{{ url_for('register') }}">register</a> if you don't have an account.</p>
    {% endif %}
{% endblock %}
