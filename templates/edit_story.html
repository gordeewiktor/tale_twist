{% extends 'base.html' %}

{% block title %}Edit Story{% endblock %}

{% block content %}
    <h2>Edit Story: {{ story.title }}</h2>
    {% if current_user.is_authenticated and current_user.id == story.author_id %}
        <form method="post">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" class="form-control" value="{{ story.title }}" required>
            </div>

            <div class="form-group">
                <label for="description">Description:</label>
                <textarea id="description" name="description" class="form-control" required>{{ story.description }}</textarea>
            </div>

            <div class="form-group">
                <label for="genre">Genre:</label>
                <input type="text" id="genre" name="genre" class="form-control" value="{{ story.genre }}" required>
            </div>

            <input type="submit" value="Update Story" class="btn btn-primary">
        </form>
    {% else %}
        <p>You do not have permission to edit this story.</p>
    {% endif %}
{% endblock %}
